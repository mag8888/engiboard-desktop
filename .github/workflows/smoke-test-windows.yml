name: Smoke Test (Windows)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build the app (current commit)
        run: cargo tauri build

      - name: Install built NSIS package silently
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          Write-Host "Installer: $($exe.FullName)"
          $p = Start-Process $exe.FullName -ArgumentList "/S" -PassThru -Wait
          Write-Host "Installer exit code: $($p.ExitCode)"

          # Poll for the installed exe (NSIS /S can return before files settle)
          $candidates = @(
            "$env:LOCALAPPDATA\Programs\EngiBoard\EngiBoard.exe",
            "$env:LOCALAPPDATA\EngiBoard\EngiBoard.exe",
            "$env:PROGRAMFILES\EngiBoard\EngiBoard.exe",
            "${env:PROGRAMFILES(X86)}\EngiBoard\EngiBoard.exe"
          )
          $installed = $null
          for ($i = 0; $i -lt 30; $i++) {
            $installed = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($installed) { break }
            Start-Sleep -Seconds 1
          }

          if ($installed) {
            echo "ENGIBOARD_EXE=$installed" >> $env:GITHUB_ENV
            Write-Host "Installed at $installed"
          } else {
            Write-Host "=== diagnostics: not found in known locations ==="
            Write-Host "LOCALAPPDATA\Programs:"
            Get-ChildItem "$env:LOCALAPPDATA\Programs" -ErrorAction SilentlyContinue | Format-Table Name
            Write-Host "Searching C:\ for EngiBoard.exe ..."
            $found = Get-ChildItem -Path "C:\" -Recurse -Filter "EngiBoard.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
            if ($found) { echo "ENGIBOARD_EXE=$found" >> $env:GITHUB_ENV; Write-Host "Found at $found" }
            else { Write-Error "EngiBoard.exe not found after install" }
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pyautogui pillow pygetwindow

      - name: Run smoke test
        env:
          SCREENSHOT_DIR: screenshots
          ENGIBOARD_EXE: ${{ env.ENGIBOARD_EXE }}
          EB_AUTODEMO: "1"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path screenshots | Out-Null
          python scripts/smoke_test.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-screenshots
          path: screenshots/
          retention-days: 7
