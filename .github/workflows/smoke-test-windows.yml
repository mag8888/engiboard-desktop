name: Smoke Test (Windows)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Debug build only — no tauri-cli, no release optimization, no installer.
      # build.rs handles Tauri codegen; frontendDist (../dist) is embedded.
      - name: Build (debug)
        working-directory: src-tauri
        run: cargo build

      - name: Resolve binary path
        shell: pwsh
        run: |
          $exe = (Resolve-Path "src-tauri/target/debug/engiboard.exe").Path
          if (Test-Path $exe) { echo "ENGIBOARD_EXE=$exe" >> $env:GITHUB_ENV; Write-Host "Binary: $exe" }
          else { Write-Error "engiboard.exe not found at $exe" }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pyautogui pillow pygetwindow

      - name: Run smoke test
        env:
          SCREENSHOT_DIR: screenshots
          ENGIBOARD_EXE: ${{ env.ENGIBOARD_EXE }}
          EB_AUTODEMO: "1"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path screenshots | Out-Null
          python scripts/smoke_test.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-screenshots
          path: screenshots/
          retention-days: 7
