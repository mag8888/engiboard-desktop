name: Smoke Test (Windows)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build the app (current commit)
        run: cargo tauri build

      - name: Install built NSIS package silently
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          Write-Host "Installing $($exe.FullName)"
          Start-Process $exe.FullName -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 3
          $installed = "$env:LOCALAPPDATA\Programs\EngiBoard\EngiBoard.exe"
          if (Test-Path $installed) {
            echo "ENGIBOARD_EXE=$installed" >> $env:GITHUB_ENV
            Write-Host "Installed at $installed"
          } else {
            $found = Get-ChildItem -Path "C:\Users" -Recurse -Filter "EngiBoard.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
            if ($found) { echo "ENGIBOARD_EXE=$found" >> $env:GITHUB_ENV; Write-Host "Found at $found" }
            else { Write-Error "EngiBoard.exe not found after install" }
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pyautogui pillow pygetwindow

      - name: Run smoke test
        env:
          SCREENSHOT_DIR: screenshots
          ENGIBOARD_EXE: ${{ env.ENGIBOARD_EXE }}
          EB_AUTODEMO: "1"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path screenshots | Out-Null
          python scripts/smoke_test.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-screenshots
          path: screenshots/
          retention-days: 7
