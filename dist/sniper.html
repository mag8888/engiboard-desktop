<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100vw;height:100vh;overflow:hidden;
  background:transparent !important;
  cursor:crosshair;user-select:none
}
#dim{position:fixed;inset:0;background:rgba(0,0,0,0.38);pointer-events:none;z-index:1}
#frame{position:fixed;inset:0;border:3px solid #2563EB;pointer-events:none;z-index:2;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
/* Бокс захвата: фиксированный формат, следует за курсором; outline даёт затемнение вокруг */
#sel{position:fixed;outline:9999px solid rgba(0,0,0,0.32);border:2px solid #2563EB;display:none;pointer-events:none;z-index:3}
#dims{position:fixed;background:#2563EB;color:#fff;font-size:12px;font-weight:600;padding:3px 9px;font-family:'SF Mono',monospace;display:none;pointer-events:none;z-index:4}
#hint{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:500;font-family:-apple-system,sans-serif;pointer-events:none;background:rgba(0,0,0,.65);padding:8px 18px;border-radius:20px;letter-spacing:.01em;z-index:4}
#hint kbd{background:rgba(255,255,255,.18);padding:2px 6px;border-radius:4px;font-family:'SF Mono',monospace;font-size:11px;margin:0 2px}
/* Переключатель формата 3:4 / 1:1 */
#ratio-pill{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.7);border:2px solid rgba(255,255,255,.35);border-radius:24px;padding:5px 6px 5px 14px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
#ratio-pill .lbl{color:rgba(255,255,255,.7);font-size:12px;font-weight:600;font-family:-apple-system,sans-serif;margin-right:4px}
#ratio-pill button{border:none;background:rgba(255,255,255,.12);color:#fff;font-size:14px;font-weight:700;font-family:-apple-system,sans-serif;padding:7px 18px;border-radius:18px;cursor:pointer;transition:background .12s}
#ratio-pill button:hover{background:rgba(255,255,255,.22)}
#ratio-pill button.on{background:#2563EB}
#cancel-btn{position:fixed;top:16px;right:16px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.55);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;transition:background .15s}
#cancel-btn:hover{background:rgba(239,68,68,.75);border-color:rgba(239,68,68,.8)}
</style>
</head>
<body>
<div id="dim"></div>
<div id="frame"></div>
<div id="sel"></div>
<div id="dims"></div>
<div id="ratio-pill">
  <span class="lbl">Format</span>
  <button id="r43" class="on" onclick="setAspect(4/3)">4:3</button>
  <button id="r11" onclick="setAspect(1)">1:1</button>
</div>
<div id="hint">Scroll — size · Click — capture · <kbd>Esc</kbd> cancel</div>
<button id="cancel-btn" onclick="cancel()" title="Cancel (Esc)">×</button>

<script>
const sel = document.getElementById('sel');
const dims = document.getElementById('dims');
const dim = document.getElementById('dim');

// aspect = ширина / высота. 4:3 (ГОРИЗОНТАЛЬНЫЙ) по умолчанию ≈ 1.333; 1:1 = 1.
let aspect = 4/3;
let boxH = 540;
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
const MINH = 80;
function maxH(){ return Math.min(window.innerHeight - 24, 1600); }

let lastX = window.innerWidth/2, lastY = window.innerHeight/2;

function drawBox(cx, cy){
  boxH = clamp(boxH, MINH, maxH());
  let h = boxH, w = h * aspect;
  const maxW = window.innerWidth - 24;
  if(w > maxW){ w = maxW; h = w / aspect; }
  const left = clamp(cx - w/2, 0, window.innerWidth - w);
  const top  = clamp(cy - h/2, 0, window.innerHeight - h);
  sel.style.cssText = `position:fixed;left:${left}px;top:${top}px;width:${w}px;height:${h}px;outline:9999px solid rgba(0,0,0,0.32);border:2px solid #2563EB;display:block;pointer-events:none;z-index:3`;
  dim.style.display = 'none';
  dims.style.cssText = `position:fixed;left:${left}px;top:${Math.max(0,top-26)}px;display:block;background:#2563EB;color:#fff;font-size:12px;font-weight:600;padding:3px 9px;font-family:'SF Mono',monospace;z-index:4`;
  dims.textContent = `${Math.round(w)} × ${Math.round(h)} · ${aspect===1?'1:1':'4:3'}`;
  return { left, top, w, h };
}

function setAspect(a){
  aspect = a;
  document.getElementById('r43').classList.toggle('on', a !== 1);
  document.getElementById('r11').classList.toggle('on', a === 1);
  drawBox(lastX, lastY);
}

document.addEventListener('mousemove', e => { lastX = e.clientX; lastY = e.clientY; drawBox(e.clientX, e.clientY); });

document.addEventListener('wheel', e => {
  e.preventDefault();
  boxH = clamp(boxH - Math.sign(e.deltaY) * 24, MINH, maxH());
  drawBox(lastX, lastY);
}, { passive: false });

document.addEventListener('mousedown', async e => {
  if (e.button !== 0) return;
  // не реагировать на клики по переключателю формата / кнопке отмены
  if (e.target.closest('#ratio-pill') || e.target.closest('#cancel-btn')) return;
  const r = drawBox(e.clientX, e.clientY);
  // смещение между client- и screen-координатами (DPI/безрамочное окно)
  const offX = e.screenX - e.clientX;
  const offY = e.screenY - e.clientY;
  document.body.style.visibility = 'hidden';
  await new Promise(res => setTimeout(res, 120));
  try {
    await window.__TAURI__.core.invoke('capture_region', {
      x: Math.round(r.left + offX),
      y: Math.round(r.top + offY),
      w: Math.round(r.w),
      h: Math.round(r.h)
    });
  } catch (err) { console.error(err); cancel(); }
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') cancel(); });

function cancel() {
  try { window.__TAURI__.core.invoke('sniper_done', { dataUrl: '' }); }
  catch (e) { window.close(); }
}

// первичная отрисовка бокса
drawBox(lastX, lastY);
</script>
</body>
</html>
