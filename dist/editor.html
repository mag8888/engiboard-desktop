<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EngiBoard · Annotate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0E10; --surf:#1A1A1D; --surf2:#222226; --line:#2C2C30; --line2:#3A3A40;
  --t1:#F5F5F7; --t2:#A0A0A8; --t3:#6E6E76;
  --acc:#3B82F6; --acc2:#2563EB; --acc-l:#1E3A5F;
  --red:#FF453A; --grn:#30D158; --amb:#FF9F0A; --pur:#BF5AF2;
  --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace
}
html,body{height:100%;font-family:var(--font);overflow:hidden;background:var(--bg);color:var(--t1)}

.shell{display:flex;flex-direction:column;height:100vh}

/* Titlebar */
.tbar{
  height:42px;background:linear-gradient(to bottom,#19191D,#141417);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0
}
.tl{display:flex;gap:7px;-webkit-app-region:no-drag}
.tl span{width:11px;height:11px;border-radius:50%;cursor:pointer}
.tc-r{background:#FF5F57}.tc-y{background:#FFBD2E}.tc-g{background:#28C840}
.ttl{flex:1;text-align:center;font-size:12px;color:var(--t2);font-weight:500}
.tact{display:flex;gap:6px;-webkit-app-region:no-drag}
.tbtn-sm{
  border:1px solid transparent;background:rgba(255,255,255,.05);color:var(--t2);
  font-size:11px;padding:5px 12px;cursor:pointer;font-family:var(--font);
  border-radius:6px;font-weight:500;transition:all .15s
}
.tbtn-sm:hover{background:rgba(255,255,255,.08);color:var(--t1);border-color:var(--line2)}
.tbtn-sm.blue{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;border:none;box-shadow:0 2px 8px rgba(59,130,246,.35)}
.tbtn-sm.blue:hover{box-shadow:0 4px 14px rgba(59,130,246,.5);transform:translateY(-1px)}
/* v0.1.69: icon-only undo/redo buttons */
.tbtn-sm.tbtn-ic{display:inline-flex;align-items:center;justify-content:center;padding:5px 8px}
.tbtn-sm.tbtn-ic svg{width:15px;height:15px;display:block}
.tbtn-sm.tbtn-ic:disabled{opacity:.35;cursor:not-allowed}

.body{flex:1;display:flex;overflow:hidden}
.cw{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;background:#000;
  background-image:radial-gradient(circle at center,#1a1a1f 0,#000 100%)
}

/* Toolbar */
.ftbar{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(28,28,32,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  display:flex;align-items:center;padding:6px;gap:2px;z-index:30;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.05) inset;
  user-select:none
}
.fb{
  position:relative;width:34px;height:34px;border:none;background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--t2);transition:all .15s;border-radius:8px
}
.fb svg{width:17px;height:17px;stroke-width:1.8}
.fb:hover{background:rgba(255,255,255,.06);color:var(--t1)}
.fb.on{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.4)}
.fb-sep{width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 4px}
.emoji-picker{display:none;position:fixed;z-index:1000;background:#1e2531;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:5px;grid-template-columns:repeat(6,26px);gap:1px;box-shadow:0 10px 30px rgba(0,0,0,.45)}
.emoji-picker.on{display:grid}
.emoji-picker button{font-size:17px;line-height:1;width:26px;height:26px;background:none;border:none;cursor:pointer;border-radius:6px;padding:0}
.emoji-picker button:hover{background:rgba(255,255,255,.16)}

/* Tooltip */
.fb::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 10px);left:50%;
  transform:translateX(-50%);background:#000;color:#fff;
  font-size:10px;font-weight:500;padding:4px 9px;border-radius:5px;
  white-space:nowrap;pointer-events:none;opacity:0;transition:.12s;z-index:100;
  border:1px solid var(--line2)
}
.fb::before{
  content:attr(data-key);position:absolute;bottom:calc(100% + 10px);right:6px;
  background:rgba(255,255,255,.15);color:#fff;font-family:var(--mono);
  font-size:9px;padding:1px 5px;border-radius:3px;
  pointer-events:none;opacity:0;transition:.12s;z-index:101;transform:translateX(0)
}
.fb:hover::after,.fb:hover::before{opacity:1}

/* Colors */
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0;position:relative}
.cdot.on{border-color:#fff;transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.cdot:hover{transform:scale(1.1)}

/* Stroke */
.sw{width:34px;height:30px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:.12s}
.sw:hover{background:rgba(255,255,255,.06)}
.sw.on{background:rgba(59,130,246,.18)}
.sw.on svg line{stroke:#3B82F6}
.sw svg line{stroke:#A0A0A8}

/* Paper */
.paper{
  background:#fff;flex-shrink:0;position:relative;overflow:hidden;
  user-select:none;border-radius:6px;transform-origin:center center;
  box-shadow:0 0 0 1px rgba(255,255,255,.06),0 24px 80px rgba(0,0,0,.4)
}
/* v0.1.125: editor zoom controls (bottom-centre) */
.ed-zoom-ctl{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:4px;background:rgba(28,28,32,.95);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:5px 8px;backdrop-filter:blur(12px)}
.ed-zoom-ctl button{width:28px;height:28px;border:none;background:rgba(255,255,255,.1);color:#fff;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font);line-height:1}
.ed-zoom-ctl button:hover{background:rgba(255,255,255,.22)}
.ed-zoom-ctl button:last-child{width:auto;border-radius:14px;padding:0 11px;font-size:11px;font-weight:600}
.ed-zoom-ctl span{color:#fff;font-size:11px;font-family:var(--mono);min-width:44px;text-align:center}
.ann-root{position:absolute;inset:0;pointer-events:none}
.fh-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:6}
.ashape{position:absolute;pointer-events:auto;cursor:default}
.arrow-wrap{position:absolute;pointer-events:auto;transform-origin:0 0}
.dim-wrap{position:absolute;pointer-events:auto}
.tlbl{position:absolute;background:rgba(0,0,0,.8);color:#fff;font-size:12px;font-weight:500;padding:4px 9px;font-family:var(--font);white-space:nowrap;cursor:pointer;pointer-events:auto;border-radius:4px}
.blur-box{position:absolute;backdrop-filter:blur(10px);background:rgba(120,120,120,.15);pointer-events:auto;border-radius:4px}
.text-inp{position:absolute;z-index:25;border:2px solid #3B82F6;background:rgba(255,255,255,.95);outline:none;font-size:13px;font-family:var(--font);color:#000;padding:4px 7px;min-width:100px;pointer-events:auto;border-radius:4px}
.cpin{position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border:2px solid #fff;cursor:pointer;pointer-events:auto;transition:transform .12s;z-index:20;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.cpin:hover{transform:translate(-50%,-50%) scale(1.15)}
.cbbl{position:absolute;z-index:21;background:#fff;border:1px solid #ddd;min-width:200px;max-width:260px;pointer-events:auto;color:#1a1a1a;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.cmt-pop{position:absolute;z-index:30;background:#fff;border:1px solid #ddd;min-width:240px;pointer-events:auto;color:#1a1a1a;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.3)}

/* Right panel — 2 stacked sections (Layers + Comments), each scrolling internally */
/* v0.1.125: right panel (Layers + Comments) hidden per client request —
   editor is now just the screenshot + toolbar, full width. Elements stay in
   the DOM (display:none) so existing JS that updates annList/cmtList won't break. */
.rpanel{ display:none !important; }
.rps-section{
  flex:1;min-height:0;display:flex;flex-direction:column;
  border-bottom:1px solid var(--line)
}
.rps-section:last-child{border-bottom:none}
.rps-section-h{padding:12px 16px 8px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.rpl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.rpl-ct{margin-left:auto;font-size:10px;color:var(--t4);font-family:var(--mono);font-weight:500;background:rgba(255,255,255,.04);padding:1px 6px;border-radius:8px}
.rps-list{
  flex:1;min-height:0;overflow-y:auto;padding:0 10px 10px;
}
.rps-list::-webkit-scrollbar{width:6px}
.rps-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.rps-list::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}
.rps-actions{padding:10px 14px;flex-shrink:0;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px;background:rgba(0,0,0,.18)}
.rps-empty{font-size:11px;color:var(--t3);padding:14px 6px;text-align:center;font-style:italic;opacity:.7}

.ali{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;font-size:12px;color:var(--t2);transition:.1s;border-radius:5px}
.ali:hover{background:rgba(255,255,255,.04);color:var(--t1)}
.ali.on{background:rgba(59,130,246,.15);color:var(--acc)}
.ali.on .adel,.ali:hover .adel{opacity:.7}
.adel{opacity:0;transition:.1s;border:none;background:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0 2px;border-radius:3px}
.adel:hover{color:var(--red);opacity:1!important;background:rgba(255,69,58,.15)}

.sbar{height:24px;background:#0a0a0c;border-top:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:18px;flex-shrink:0;font-size:10px;color:var(--t3);font-family:var(--mono)}
.sbar .r{margin-left:auto}

.notif{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--line2);color:#fff;padding:10px 22px;font-size:12px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:.2s;font-family:var(--font);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.notif.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

input[type=range]{width:100%;accent-color:#3B82F6;cursor:pointer;height:4px;background:var(--surf2);border-radius:2px}

.tbar{-webkit-app-region:drag;app-region:drag}
.tbar button,.tbar .tact,.tbar .tbtn-sm{-webkit-app-region:no-drag;app-region:no-drag}

</style>
</head>
<body>
<!-- v0.1.104: initial loading state visible until the script removes it.
     If the script never runs (script crash, WebView load failure, etc.) the
     user sees a meaningful message + Close button instead of pure blank. -->
<div id="_eb_initial" style="position:fixed;inset:0;background:#F8FAFC;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0F172A;padding:30px;text-align:center">
  <div style="width:60px;height:60px;border:4px solid #E2E8F0;border-top-color:#0EA5E9;border-radius:50%;animation:_ebspin 0.8s linear infinite;margin-bottom:24px"></div>
  <div style="font-size:16px;font-weight:600;margin-bottom:8px">Loading editor…</div>
  <div id="_eb_initial_msg" style="font-size:13px;color:#64748B;line-height:1.5;max-width:480px">Preparing screenshot data.</div>
  <button onclick="(function(){try{const inv=window.__TAURI__?.core?.invoke||window.__TAURI__?.invoke;if(inv)inv('close_editor');else window.close();}catch(e){window.close();}})()" style="margin-top:24px;background:#fff;border:1px solid #E2E8F0;color:#0F172A;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit">Close editor</button>
  <style>@keyframes _ebspin { to { transform: rotate(360deg) } }</style>
</div>

<div id="emojiPicker" class="emoji-picker"></div>

<div class="shell">
<div class="tbar">
  <div style="width:78px;flex-shrink:0"></div>
  <div class="ttl">EngiBoard · Annotate</div>
  <div class="tact">
    <button class="tbtn-sm tbtn-ic" onclick="undoLast()" title="Undo (⌘Z)" aria-label="Undo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <button class="tbtn-sm tbtn-ic" onclick="redoNext()" title="Redo (⌘⇧Z)" aria-label="Redo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
    <button class="tbtn-sm" onclick="clearAll()">Clear</button>
    <button class="tbtn-sm" onclick="discard()" title="Discard (Esc)">Discard</button>
    <button class="tbtn-sm blue" onclick="saveTask()" title="Done — save to task & close (Enter)">Done ✓</button>
  </div>
</div>

<div class="body">
<div class="cw" id="cw">
  <div class="ftbar" id="ftbar">
    <button class="fb on" data-id="select" data-tip="Select" data-key="V" onclick="setTool('select')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg></button>
    <button class="fb" data-id="hand" data-tip="Hand (Pan)" data-key="H" onclick="setTool('hand')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg></button>
    <div class="fb-sep"></div>
    <button class="fb" data-id="rect" data-tip="Rectangle" data-key="R" onclick="setTool('rect')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></button>
    <button class="fb" data-id="circle" data-tip="Circle" data-key="C" onclick="setTool('circle')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg></button>
    <button class="fb" data-id="arrow" data-tip="Arrow" data-key="A" onclick="setTool('arrow')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 5l7 7-7 7"/></svg></button>
    <button class="fb" data-id="line" data-tip="Line" data-key="L" onclick="setTool('line')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round"/></svg></button>
    <button class="fb" data-id="freehand" data-tip="Freehand" data-key="P" onclick="setTool('freehand')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l7-7 3 3-7 7-3-3zM18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg></button>
    <button class="fb" data-id="marker" data-tip="Marker" data-key="M" onclick="setTool('marker')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 9l4 4-4 4-4-4 4-4zM7 17l-2 2M9 11L21 3M14 6l5 5"/></svg></button>
    <div class="fb-sep"></div>
    <button class="fb" data-id="text" data-tip="Text" data-key="T" onclick="setTool('text')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2M9 20h6M12 4v16"/></svg></button>
    <!-- v0.1.157 (N7 from 2026-06-05 follow-up): DB asked to remove the
         dimension/ruler tool entirely. The "153 mm" auto-readout was
         meaningless on a non-CAD screenshot and confused users. Existing
         annotations of type 'dimension' still render, but the tool is no
         longer creatable from the toolbar. -->
    <!-- <button class="fb" data-id="dimension" data-tip="Dimension" data-key="D" onclick="setTool('dimension')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.3 8.7L8.7 21.3a2.4 2.4 0 0 1-3.4 0L2.7 18.7a2.4 2.4 0 0 1 0-3.4L15.3 2.7a2.4 2.4 0 0 1 3.4 0l2.6 2.6a2.4 2.4 0 0 1 0 3.4zM7.5 10.5l2 2M10.5 7.5l2 2M13.5 4.5l2 2M4.5 13.5l2 2"/></svg></button> -->
    <button class="fb" data-id="blur" data-tip="Blur" data-key="B" onclick="setTool('blur')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10 10 0 0 1 12 20c-7 0-11-8-11-8a18.4 18.4 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"/></svg></button>
    <button class="fb" data-id="comment" data-tip="Comment" data-key="Q" onclick="setTool('comment')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <button class="fb" data-id="emoji" data-tip="Emoji" data-key="E" onclick="toggleEmojiPicker(event)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9.5" x2="9.01" y2="9.5"/><line x1="15" y1="9.5" x2="15.01" y2="9.5"/></svg></button>
    <div class="fb-sep"></div>
    <div class="cdot on" style="background:#FF453A" data-c="#FF453A" onclick="setCol(this)"></div>
    <div class="cdot" style="background:#FF9F0A" data-c="#FF9F0A" onclick="setCol(this)"></div>
    <div class="cdot" style="background:#3B82F6" data-c="#3B82F6" onclick="setCol(this)"></div>
    <div class="cdot" style="background:#30D158" data-c="#30D158" onclick="setCol(this)"></div>
    <div class="cdot" style="background:#BF5AF2" data-c="#BF5AF2" onclick="setCol(this)"></div>
    <div class="cdot" style="background:#fff" data-c="#FFFFFF" onclick="setCol(this)"></div>
    <div class="fb-sep"></div>
    <button class="sw" data-w="1" onclick="setSW(this)"><svg width="16" height="2"><line x1="0" y1="1" x2="16" y2="1" stroke-width="1"/></svg></button>
    <button class="sw on" data-w="2" onclick="setSW(this)"><svg width="16" height="3"><line x1="0" y1="1.5" x2="16" y2="1.5" stroke-width="2"/></svg></button>
    <button class="sw" data-w="3" onclick="setSW(this)"><svg width="16" height="4"><line x1="0" y1="2" x2="16" y2="2" stroke-width="3"/></svg></button>
    <button class="sw" data-w="5" onclick="setSW(this)"><svg width="16" height="6"><line x1="0" y1="3" x2="16" y2="3" stroke-width="5"/></svg></button>

    <!-- v0.1.156 (#29 MR): fill toggle for rect/circle. Shows only when one
         of those tools is active. -->
    <div class="fb-sep" id="shapeFillSep" style="display:none"></div>
    <button class="sw" id="shapeFillBtn" data-tip="Fill (toggle)" style="display:none" onclick="toggleShapeFill()" title="Fill shape">
      <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" fill="currentColor" id="shapeFillIcoFill" style="opacity:0"/><rect x="2" y="2" width="12" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>

    <!-- v0.1.156 (#31/#32 MR): arrow direction picker (end / start / both)
         and head-size slider. Shown only when the arrow tool is active. -->
    <div class="fb-sep" id="arrowOptsSep" style="display:none"></div>
    <button class="sw arrow-dir-btn on" id="arrowDirEnd" data-dir="end" style="display:none" onclick="setArrowDir('end')" title="Arrow at end">
      <svg width="20" height="10" viewBox="0 0 20 10"><line x1="0" y1="5" x2="14" y2="5" stroke="currentColor" stroke-width="2"/><path d="M14 1 L19 5 L14 9 Z" fill="currentColor"/></svg>
    </button>
    <button class="sw arrow-dir-btn" id="arrowDirStart" data-dir="start" style="display:none" onclick="setArrowDir('start')" title="Arrow at start">
      <svg width="20" height="10" viewBox="0 0 20 10"><line x1="6" y1="5" x2="20" y2="5" stroke="currentColor" stroke-width="2"/><path d="M6 1 L1 5 L6 9 Z" fill="currentColor"/></svg>

  <div class="paper" id="paper" style="width:860px;height:560px">

    <input id="textInp" class="text-inp" style="display:none;z-index:15" placeholder="Type label…" onkeydown="onTextKey(event)" oninput="this.style.width=Math.max(100,this.scrollWidth+4)+'px'">
    <div id="cmtPop" class="cmt-pop" style="display:none;z-index:16">

      <div style="padding:6px 10px 8px;display:flex;justify-content:flex-end;gap:6px;border-top:1px solid #eee">
        <button onclick="closeCmtPop()" style="padding:5px 12px;font-size:11px;border:none;background:none;cursor:pointer;color:#888;font-family:var(--font);border-radius:4px">Cancel</button>
        <button onclick="submitCmt()" style="padding:5px 12px;font-size:11px;border:none;background:#3B82F6;color:#fff;cursor:pointer;font-family:var(--font);border-radius:4px;font-weight:600">Post</button>

  </div>

<!-- v0.1.74: html2canvas CDN removed — native compositeToDataUrl() replaces it
     (no network dependency, captures the background reliably). -->
<script>
let tool='select', color='#FF453A', sw=2, opVal=1;
// v0.1.156 (#29/#31/#32 MR): per-tool drawing options.
let shapeFill = false;        // #29 toggle: rect/circle filled vs. stroked
let arrowDir  = 'end';        // #31: 'end' | 'start' | 'both'
let arrowSize = 1;             // #32: arrowhead size multiplier (0.6 .. 2.0)
let pendingEmoji=null;
const EMOJIS=['👍','👎','✅','❌','🔥','⭐','💯','⚠️','❗','❓','👀','🎉'];
const EMOJI_SIZE=40;  // glyph size in paper CSS px (scaled up on save to match)
function toggleEmojiPicker(ev){
  if(ev) ev.stopPropagation();
  const pk=document.getElementById('emojiPicker');
  if(pk.classList.contains('on')){ pk.classList.remove('on'); return; }
  if(!pk.dataset.built){
    pk.innerHTML=EMOJIS.map(e=>`<button type="button" onclick="pickEmoji('${e}')">${e}</button>`).join('');
    pk.dataset.built='1';
  }
  const btn=document.querySelector('.fb[data-id="emoji"]');
  const r=btn.getBoundingClientRect();
  pk.style.left=Math.min(r.left, window.innerWidth-260)+'px';
  pk.style.top=(r.bottom+6)+'px';
  pk.classList.add('on');
}
function pickEmoji(e){
  pendingEmoji=e;
  document.getElementById('emojiPicker').classList.remove('on');
  setTool('emoji');
  notify('Click on the screenshot to place '+e);
}
function placeEmoji(pos){
  if(!pendingEmoji) return;
  pushHistory();
  annotations.push({id:'a'+Date.now(),type:'emoji',x:pos.x,y:pos.y,w:0,h:0,emoji:pendingEmoji,size:EMOJI_SIZE});
  renderAll();updateList();updateCount();
}
document.addEventListener('mousedown',ev=>{
  const pk=document.getElementById('emojiPicker');
  if(pk&&pk.classList.contains('on')&&!ev.target.closest('#emojiPicker')&&!ev.target.closest('.fb[data-id="emoji"]')){
    pk.classList.remove('on');
  }
},true);
let annotations=[], undoStack=[], redoStack=[], comments=[], commentCount=0;
const HISTORY_MAX = 10; // 5 back + 5 forward typical
function pushHistory(){
  undoStack.push(JSON.parse(JSON.stringify(annotations)));
  if(undoStack.length > HISTORY_MAX) undoStack.shift();
  redoStack = []; // any new edit invalidates redo stack
}
let selId=null, drawing=false, startPos={x:0,y:0}, cur=null;
let isPanning=false, panStart={x:0,y:0,ox:0,oy:0}, panOff={x:0,y:0};
// v0.1.125: zoom inside the editor. CSS transform scale is safe because
// relPos() uses getBoundingClientRect (percentages stay correct).
let _edScale = 1;
function applyPaperTransform(){
  const p = document.getElementById('paper');
  if(p) p.style.transform = `translate(${panOff.x}px,${panOff.y}px) scale(${_edScale})`;
  const lvl = document.getElementById('edZoomLevel');
  if(lvl) lvl.textContent = Math.round(_edScale*100) + '%';
}
function edZoomBy(d){ _edScale = Math.max(0.25, Math.min(6, _edScale + d)); applyPaperTransform(); }
function edZoomReset(){ _edScale = 1; panOff = {x:0,y:0}; applyPaperTransform(); }
// Wheel over the canvas → zoom
window.addEventListener('wheel', (e) => {
  const cw = document.getElementById('cw');
  if(!cw || !cw.contains(e.target)) return;
  e.preventDefault();
  edZoomBy(e.deltaY < 0 ? 0.15 : -0.15);
}, { passive: false });
// Keyboard: +/-/0
window.addEventListener('keydown', (e) => {
  if(e.target.closest('input,textarea,[contenteditable]')) return;
  if(e.key === '+' || e.key === '='){ edZoomBy(0.25); }
  else if(e.key === '-' || e.key === '_'){ edZoomBy(-0.25); }
  else if(e.key === '0'){ edZoomReset(); }
});
let isDragging=false, dragStart=null;
let textPos=null, cmtPos=null;

const paper=document.getElementById('paper');
const annRoot=document.getElementById('annRoot');
const fhSvg=document.getElementById('fhSvg');
const prevDiv=document.getElementById('prevDiv');
const prevSvg=document.getElementById('prevSvg');

function relPos(e){const r=paper.getBoundingClientRect();return{x:((e.clientX-r.left)/r.width)*100,y:((e.clientY-r.top)/r.height)*100}}

function setTool(t){
  tool=t;
  document.querySelectorAll('.fb[data-id]').forEach(b=>b.classList.toggle('on',b.dataset.id===t));
  paper.style.cursor=t==='hand'?'grab':t==='text'?'text':t==='select'?'default':'crosshair';
  const btn=document.querySelector('.fb[data-id="'+t+'"]');
  document.getElementById('sbTool').textContent=`Tool: ${t[0].toUpperCase()+t.slice(1)} (${btn?btn.dataset.key:''})`;
  closeCmtPop();commitText();
  if(t!=='emoji'){const pk=document.getElementById('emojiPicker');if(pk)pk.classList.remove('on');}
  // v0.1.156: toggle contextual option controls based on the active tool.
  syncToolOptionsUi();
}
function syncToolOptionsUi(){
  const isShape = tool === 'rect' || tool === 'circle';
  const isArrow = tool === 'arrow';
  document.getElementById('shapeFillSep').style.display = isShape ? '' : 'none';
  document.getElementById('shapeFillBtn').style.display = isShape ? '' : 'none';
  document.getElementById('shapeFillBtn').classList.toggle('on', shapeFill);
  document.getElementById('shapeFillIcoFill').style.opacity = shapeFill ? '1' : '0';
  document.getElementById('arrowOptsSep').style.display = isArrow ? '' : 'none';
  ['arrowDirEnd','arrowDirStart','arrowDirBoth'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = isArrow ? '' : 'none';
    el.classList.toggle('on', isArrow && arrowDir === el.dataset.dir);
  });
  const slider = document.getElementById('arrowSizeRange');
  slider.style.display = isArrow ? '' : 'none';
  slider.value = String(arrowSize);
}
function toggleShapeFill(){
  shapeFill = !shapeFill;
  syncToolOptionsUi();
}
function setArrowDir(d){
  arrowDir = d;
  syncToolOptionsUi();
}
function setArrowSize(v){
  arrowSize = isFinite(v) ? v : 1;
}
function setCol(el){color=el.dataset.c;document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('on'));el.classList.add('on');}
// v0.1.156 (#30 MR): commit a manual dimension label into the annotation
// model. Empty string clears the override and falls back to the auto-mm.
function updateDimLabel(id, value){
  const a = annotations.find(x => x.id === id);
  if(!a) return;
  if(value && value.trim()) a.label = value.trim(); else delete a.label;
  // Don't full re-render — that would lose the input focus. Just remember.
}
function setSW(el){
  sw=+el.dataset.w;
  // Only toggle .on among the stroke-width siblings, not every .sw element
  // (the new contextual controls are also .sw and should stay highlighted
  // based on their own state).
  document.querySelectorAll('button.sw[data-w]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
// v0.1.29: opacity slider removed — opVal stays at 1.0 always
function setOp(v){ /* no-op */ }

paper.addEventListener('mousedown',e=>{
  if(e.target.closest('#cmtPop,#textInp')) return;
  closeCmtPop();
  if(tool==='hand'){isPanning=true;paper.style.cursor='grabbing';panStart={x:e.clientX,y:e.clientY,ox:panOff.x,oy:panOff.y};return;}
  if(tool==='select'){
    const p=relPos(e);
    const hit=[...annotations].reverse().find(a=>{
      if(a.locked) return false;
      if(a.type==='freehand'){const xs=(a.pts||[]).map(q=>q.x),ys=(a.pts||[]).map(q=>q.y);return xs.length&&p.x>=Math.min(...xs)-3&&p.x<=Math.max(...xs)+3&&p.y>=Math.min(...ys)-3&&p.y<=Math.max(...ys)+3;}
      if(a.type==='text') return Math.abs(p.x-a.x)<15&&Math.abs(p.y-a.y)<6;
      if(a.type==='emoji') return Math.abs(p.x-a.x)<6&&Math.abs(p.y-a.y)<6;
      const ax=Math.min(a.x,a.x+a.w),ay=Math.min(a.y,a.y+a.h);
      return p.x>=ax&&p.x<=ax+Math.abs(a.w)&&p.y>=ay&&p.y<=ay+Math.abs(a.h);
    });
    if(hit){selId=hit.id;isDragging=true;dragStart={mx:p.x,my:p.y,ox:hit.x,oy:hit.y};e.preventDefault();}
    else{selId=null;isDragging=false;dragStart=null;}
    renderAll();return;
  }
  if(tool==='comment'){cmtPos=relPos(e);showCmtPopUI(e);return;}
  if(tool==='emoji'){placeEmoji(relPos(e));return;}
  if(tool==='text'){commitText();textPos=relPos(e);showTextInp(textPos);return;}
  const p=relPos(e);
  drawing=true;startPos=p;
  const s=tool==='marker'?Math.max(sw*4,8):tool==='pen'?1:sw;
  const op=tool==='marker'?0.35:opVal;
  cur=tool==='freehand'||tool==='pen'||tool==='marker'
    ?{id:'a'+Date.now(),type:'freehand',x:p.x,y:p.y,w:0,h:0,color,sw:s,op,pts:[{x:p.x,y:p.y}]}
    :{id:'a'+Date.now(),type:tool,x:p.x,y:p.y,w:0,h:0,color,sw:s,op,
       // v0.1.156 (#29/#31/#32 MR): pick up the current toolbar settings.
       ...(tool==='rect'||tool==='circle' ? { fill: !!shapeFill } : {}),
       ...(tool==='arrow' ? { headDir: arrowDir || 'end', headSize: arrowSize || 1 } : {})};
});

paper.addEventListener('mousemove',e=>{
  const p=relPos(e);
  document.getElementById('sbPos').textContent=`${p.x.toFixed(1)}% ${p.y.toFixed(1)}%`;
  if(isPanning){panOff={x:panStart.ox+(e.clientX-panStart.x),y:panStart.oy+(e.clientY-panStart.y)};applyPaperTransform();return;}
  if(isDragging&&dragStart&&selId){
    const dx=p.x-dragStart.mx,dy=p.y-dragStart.my;
    annotations=annotations.map(a=>{
      if(a.id!==selId) return a;
      if(a.type==='freehand') return{...a,x:dragStart.ox+dx,y:dragStart.oy+dy,pts:(a.pts||[]).map(q=>({x:q.x+dx,y:q.y+dy}))};
      return{...a,x:dragStart.ox+dx,y:dragStart.oy+dy};
    });
    dragStart={mx:p.x,my:p.y,ox:dragStart.ox+dx,oy:dragStart.oy+dy};
    renderAll();return;
  }
  if(!drawing||!cur) return;
  if(cur.type==='freehand') cur={...cur,pts:[...(cur.pts||[]),{x:p.x,y:p.y}]};
  else {
    let w = p.x - startPos.x;
    let h = p.y - startPos.y;
    // v0.1.156 (#34 MR): hold Shift to constrain drawing.
    // - Lines/arrows: snap angle to nearest 0° / 45° / 90°.
    // - Rectangles/circles: equal sides (square / round circle), pivoting on
    //   the longer axis so the cursor still drives the size.
    if(e.shiftKey){
      if(cur.type === 'line' || cur.type === 'arrow'){
        const ang = Math.atan2(h, w);
        const snapped = Math.round(ang / (Math.PI / 4)) * (Math.PI / 4);
        const len = Math.sqrt(w*w + h*h);
        w = Math.cos(snapped) * len;
        h = Math.sin(snapped) * len;
      } else if(cur.type === 'rect' || cur.type === 'circle'){
        const ax = Math.abs(w), ay = Math.abs(h);
        const side = Math.max(ax, ay);
        w = (w < 0 ? -1 : 1) * side;
        h = (h < 0 ? -1 : 1) * side;
      }
    }
    cur = { ...cur, w, h };
  }
  renderPrev();
});

function commitCurrent(){
  if(!cur) return;
  const valid=cur.type==='freehand'?(cur.pts?.length||0)>2:Math.abs(cur.w)>0.5||Math.abs(cur.h)>0.5;
  if(valid){
    pushHistory();
    annotations.push(cur);
    cur=null;
    clearPrev();
    renderAll();updateList();updateCount();
    return true;
  }
  cur=null;clearPrev();
  return false;
}

paper.addEventListener('mouseup',()=>{
  if(isPanning){isPanning=false;paper.style.cursor='grab';return;}
  if(isDragging){isDragging=false;dragStart=null;renderAll();return;}
  if(!drawing) return;
  drawing=false;
  commitCurrent();
});
window.addEventListener('mouseup',()=>{
  // Safety: commit even if mouseup happens outside paper
  if(drawing){drawing=false;commitCurrent();}
});

function makeAnnotEl(a,prev=false){
  const x=Math.min(a.x,a.x+a.w),y=Math.min(a.y,a.y+a.h);
  const w=Math.abs(a.w),h=Math.abs(a.h);
  const op=prev?0.6:(a.op??1);
  const sel=!prev&&a.id===selId;
  if(a.type==='rect'){
    // v0.1.156 (#29 MR): rectangle can be filled. The fill colour is the
    // shape colour at 25% alpha so the stroke is still visible on top.
    const d=document.createElement('div');d.className='ashape';
    const fillCss = a.fill ? `background:${a.color}40;` : '';
    d.style.cssText=`left:${x}%;top:${y}%;width:${w}%;height:${h}%;border:${a.sw}px solid ${a.color};${fillCss}opacity:${op}`;
    if(sel)d.style.outline=`2px solid ${a.color}`;return{el:d,layer:'div'};}
  if(a.type==='circle'){
    const d=document.createElement('div');d.className='ashape';
    const fillCss = a.fill ? `background:${a.color}40;` : '';
    d.style.cssText=`left:${x}%;top:${y}%;width:${w}%;height:${h}%;border:${a.sw}px solid ${a.color};border-radius:50%;${fillCss}opacity:${op}`;
    if(sel)d.style.outline=`2px solid ${a.color}`;return{el:d,layer:'div'};}
  if(a.type==='arrow'||a.type==='line'){
    // v0.1.151 (fix #7 #8 reported by DB): previous implementation used a
    // rotated <div> with width sized in % of paper width — that's wrong
    // because the line vector's length mixes x% (paper width) and y% (paper
    // height), so on a non-square canvas the line drifted away from the
    // cursor (#8) and the arrow head was a hand-painted CSS triangle that
    // looked chunky (#7). Switch to SVG: the fhSvg layer has viewBox 0 0
    // 100 100 with preserveAspectRatio="none", so the % coords map exactly
    // 1:1 to the same percentage system used by relPos(). Both the line
    // body and arrow head are drawn as a single SVG path so they share
    // stroke / aa behaviour and never separate.
    const ns='http://www.w3.org/2000/svg';
    const g=document.createElementNS(ns,'g');
    g.style.opacity=op;
    const x1=a.x, y1=a.y, x2=a.x+a.w, y2=a.y+a.h;
    const line=document.createElementNS(ns,'line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke',a.color);
    line.setAttribute('stroke-width',a.sw);
    line.setAttribute('stroke-linecap','round');
    // vector-effect keeps stroke width constant regardless of viewBox scale —
    // otherwise the line would thin out on wide paper.
    line.setAttribute('vector-effect','non-scaling-stroke');
    g.appendChild(line);
    if(a.type==='arrow'){
      // v0.1.156 (#31/#32 MR): arrow now supports configurable direction
      // (end / start / both) and an arrowSize multiplier. Defaults match
      // the previous behaviour ('end' direction, size 1.0).
      const dir = a.headDir || 'end';
      const sizeMul = (typeof a.headSize === 'number' ? a.headSize : 1) || 1;
      const rect=fhSvg.getBoundingClientRect();
      const px=(rect.width||1)/100, py=(rect.height||1)/100;
      const dxPx=(x2-x1)*px, dyPx=(y2-y1)*py;
      const lenPx=Math.sqrt(dxPx*dxPx+dyPx*dyPx) || 1;
      const headLenPx=(10 + a.sw*2) * sizeMul;
      const headHalfPx=(5 + a.sw*1.2) * sizeMul;
      const ux=dxPx/lenPx, uy=dyPx/lenPx;
      const perpX=-uy, perpY=ux;
      // Helper — append one arrowhead at (tipX,tipY) pointing AWAY from the
      // opposite end (uxDir signed). Returns the base point so we can clip
      // the line cleanly at each tip.
      function drawHead(tipX, tipY, signX, signY){
        const tipPxX = tipX*px, tipPxY = tipY*py;
        const baseXPx = tipPxX - signX*ux*headLenPx;
        const baseYPx = tipPxY - signY*uy*headLenPx;
        const leftX  = (baseXPx + perpX*headHalfPx)/px;
        const leftY  = (baseYPx + perpY*headHalfPx)/py;
        const rightX = (baseXPx - perpX*headHalfPx)/px;
        const rightY = (baseYPx - perpY*headHalfPx)/py;
        const head = document.createElementNS(ns,'path');
        head.setAttribute('d', `M ${tipX} ${tipY} L ${leftX} ${leftY} L ${rightX} ${rightY} Z`);
        head.setAttribute('fill', a.color);
        head.setAttribute('stroke','none');
        g.appendChild(head);
        return { baseFracX: baseXPx/px, baseFracY: baseYPx/py };
      }
      let endX2 = x2, endY2 = y2, endX1 = x1, endY1 = y1;
      if(dir === 'end' || dir === 'both'){
        const b = drawHead(x2, y2, 1, 1);
        endX2 = b.baseFracX; endY2 = b.baseFracY;
      }
      if(dir === 'start' || dir === 'both'){
        const b = drawHead(x1, y1, -1, -1);
        endX1 = b.baseFracX; endY1 = b.baseFracY;
      }
      line.setAttribute('x1', endX1); line.setAttribute('y1', endY1);
      line.setAttribute('x2', endX2); line.setAttribute('y2', endY2);
    }
    if(sel){
      // Selection highlight: render a fat translucent stroke under the line
      // so the user knows what they're about to drag/delete.
      const halo=document.createElementNS(ns,'line');
      halo.setAttribute('x1',x1); halo.setAttribute('y1',y1);
      halo.setAttribute('x2',x2); halo.setAttribute('y2',y2);
      halo.setAttribute('stroke',a.color);
      halo.setAttribute('stroke-width',a.sw+6);
      halo.setAttribute('stroke-opacity','0.25');
      halo.setAttribute('stroke-linecap','round');
      halo.setAttribute('vector-effect','non-scaling-stroke');
      g.insertBefore(halo, g.firstChild);
    }
    return{el:g,layer:'svg'};
  }
  if(a.type==='blur'){const d=document.createElement('div');d.className='blur-box';d.style.cssText=`left:${x}%;top:${y}%;width:${w}%;height:${h}%;opacity:${op}`;if(sel)d.style.outline=`2px solid ${a.color}`;return{el:d,layer:'div'};}
  if(a.type==='text'){const d=document.createElement('div');d.className='tlbl';d.style.cssText=`left:${a.x}%;top:${a.y}%;background:${a.color};opacity:${op}`;d.textContent=a.text||'';d.onclick=()=>{selId=a.id;renderAll();updateList();};return{el:d,layer:'div'};}
  if(a.type==='emoji'){const d=document.createElement('div');d.style.cssText=`position:absolute;left:${a.x}%;top:${a.y}%;transform:translate(-50%,-50%);font-size:${a.size||EMOJI_SIZE}px;line-height:1;opacity:${op};user-select:none${sel?';outline:2px solid #0EA5E9;outline-offset:2px;border-radius:4px':''}`;d.textContent=a.emoji||'';d.onclick=()=>{selId=a.id;renderAll();updateList();};return{el:d,layer:'div'};}
  if(a.type==='dimension'){
    // v0.1.156 (#30 MR): the auto-computed mm value (width × 4.2) is just
    // a guess — drawings aren't to scale. Allow the user to override with
    // an explicit value via a.label. Stored alongside the geometry; the
    // input below is shown when the annotation is selected.
    const wrap=document.createElement('div');
    wrap.className='dim-wrap';
    wrap.style.cssText=`left:${x}%;top:${y}%;width:${w}%;opacity:${op}`;
    const fallback = Math.round(w*4.2) + 'mm';
    const labelText = a.label || fallback;
    const escaped = String(labelText).replace(/"/g,'&quot;');
    const editable = sel
      ? `<input class="dim-label-inp" value="${escaped}" placeholder="${fallback}"
          oninput="updateDimLabel('${a.id}', this.value)"
          onclick="event.stopPropagation()"
          onmousedown="event.stopPropagation()"
          style="text-align:center;font-size:9px;font-weight:700;color:${a.color};font-family:monospace;margin-top:2px;width:100%;background:rgba(255,255,255,.85);border:1px dashed ${a.color};border-radius:3px;outline:none;padding:1px 2px">`
      : `<div style="text-align:center;font-size:9px;font-weight:700;color:${a.color};font-family:monospace;margin-top:2px">${labelText}</div>`;
    wrap.innerHTML = `<div style="display:flex;align-items:center"><div style="width:1px;height:10px;background:${a.color}"></div><div style="flex:1;height:${a.sw}px;background:${a.color}"></div><div style="width:1px;height:10px;background:${a.color}"></div></div>${editable}`;
    return{el:wrap,layer:'div'};
  }
  if(a.type==='freehand'){
    if(!a.pts||a.pts.length<2) return null;
    const ns='http://www.w3.org/2000/svg';
    const pathD=a.pts.map((pt,i)=>{if(i===0) return`M ${pt.x} ${pt.y}`;const pv=a.pts[i-1];return`Q ${pv.x} ${pv.y} ${(pv.x+pt.x)/2} ${(pv.y+pt.y)/2}`;}).join(' ');
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',pathD);path.setAttribute('fill','none');
    path.setAttribute('stroke',a.color);path.setAttribute('stroke-width',a.sw);
    path.setAttribute('stroke-linecap','round');path.setAttribute('stroke-linejoin','round');
    path.setAttribute('vector-effect','non-scaling-stroke');path.style.opacity=op;
    if(sel) path.style.filter=`drop-shadow(0 0 3px ${a.color})`;
    return{el:path,layer:'svg'};
  }
  return null;
}

// v0.1.72: close goes through Rust (invoke close_editor → w.destroy()) FIRST.
// The previous version called the JS getCurrentWindow().destroy() first, but
// the Tauri-2 JS window API path is unreliable across builds (getCurrentWindow
// can be undefined → silent throw → window stays open). Rust-side destroy()
// always works and is not blockable. JS API kept only as a last-ditch fallback.
async function forceCloseEditor(){
  _autosaveSkip = true;
  // Primary: ask Rust to destroy the editor window + show main.
  try {
    const invoke = window.__TAURI__?.core?.invoke || window.__TAURI__?.invoke;
    if(invoke){ await invoke('close_editor'); return; }
  } catch(e){ console.error('invoke close_editor failed', e); }
  // Fallback A: JS window API
  try {
    const gw = window.__TAURI__?.window?.getCurrentWindow;
    if(gw){ await gw().destroy(); return; }
  } catch(e){ console.error('JS destroy failed', e); }
  // Fallback B
  try { window.close(); } catch(_){}
}

// v0.1.74: native composite. html2canvas (CDN 1.4.1) did not capture the
// object-fit:contain background <img>, so the saved PNG was transparent —
// the task thumbnail collapsed to the plain dark .pi background. We now
// draw the background + every annotation onto a real <canvas> ourselves:
// no CDN dependency, no object-fit/taint issues, exact geometry.
function compositeToDataUrl(){
  const bg = document.getElementById('realBg');
  // canvas size = the screenshot's natural pixels (fallback to paper box)
  const paper = document.getElementById('paper');
  const W = (bg && bg.naturalWidth)  ? bg.naturalWidth  : paper.offsetWidth;
  const H = (bg && bg.naturalHeight) ? bg.naturalHeight : paper.offsetHeight;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  // 1) background screenshot
  if(bg && bg.src && bg.naturalWidth){
    try { ctx.drawImage(bg, 0, 0, W, H); }
    catch(e){ ctx.fillStyle = '#0F172A'; ctx.fillRect(0,0,W,H); }
  } else { ctx.fillStyle = '#0F172A'; ctx.fillRect(0,0,W,H); }
  // helpers: annotation coords are PERCENT of paper
  const PX = p => p/100*W, PY = p => p/100*H;
  for(const a of annotations){
    ctx.save();
    ctx.globalAlpha = (a.op==null?1:a.op);
    ctx.strokeStyle = a.color; ctx.fillStyle = a.color;
    ctx.lineWidth = (a.sw||2);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const x = PX(Math.min(a.x, a.x+(a.w||0))), y = PY(Math.min(a.y, a.y+(a.h||0)));
    const w = PX(Math.abs(a.w||0)),            h = PY(Math.abs(a.h||0));
    if(a.type==='rect'){ ctx.strokeRect(x,y,w,h); }
    else if(a.type==='circle'){ ctx.beginPath(); ctx.ellipse(x+w/2,y+h/2,Math.abs(w/2),Math.abs(h/2),0,0,2*Math.PI); ctx.stroke(); }
    else if(a.type==='blur'){ ctx.globalAlpha=0.5; ctx.fillStyle='#94A3B8'; ctx.fillRect(x,y,w,h); }
    else if(a.type==='arrow' || a.type==='line'){
      const x1=PX(a.x), y1=PY(a.y), x2=PX(a.x+(a.w||0)), y2=PY(a.y+(a.h||0));
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      if(a.type==='arrow'){
        const ang=Math.atan2(y2-y1,x2-x1), hs=(8+(a.sw||2)*2);
        ctx.beginPath(); ctx.moveTo(x2,y2);
        ctx.lineTo(x2-hs*Math.cos(ang-Math.PI/7), y2-hs*Math.sin(ang-Math.PI/7));
        ctx.lineTo(x2-hs*Math.cos(ang+Math.PI/7), y2-hs*Math.sin(ang+Math.PI/7));
        ctx.closePath(); ctx.fill();
      }
    }
    else if(a.type==='freehand' && a.pts && a.pts.length>1){
      ctx.beginPath(); ctx.moveTo(PX(a.pts[0].x),PY(a.pts[0].y));
      for(let i=1;i<a.pts.length;i++){ const pv=a.pts[i-1],pt=a.pts[i];
        ctx.quadraticCurveTo(PX(pv.x),PY(pv.y),PX((pv.x+pt.x)/2),PY((pv.y+pt.y)/2)); }
      ctx.stroke();
    }
    else if(a.type==='dimension'){
      const mm=Math.round(Math.abs(a.w||0)*4.2);
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x,y+6);
                       ctx.moveTo(x+w,y-6); ctx.lineTo(x+w,y+6); ctx.stroke();
      ctx.font='bold 13px monospace'; ctx.textAlign='center';
      ctx.fillText(mm+'mm', x+w/2, y+20);
    }
    else if(a.type==='text' && a.text){
      ctx.font='600 14px -apple-system,system-ui,sans-serif';
      const tw=ctx.measureText(a.text).width, tx=PX(a.x), ty=PY(a.y);
      ctx.fillStyle=a.color; ctx.fillRect(tx,ty,tw+18,24);
      ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(a.text, tx+9, ty+12);
    }
    else if(a.type==='emoji' && a.emoji){
      // Scale glyph from paper CSS px to the screenshot's natural px so the
      // saved emoji matches its on-screen size. Centered on the click point.
      const scale = W / (paper.offsetWidth || W);
      const px = Math.max(12, (a.size||EMOJI_SIZE) * scale);
      ctx.globalAlpha = 1;
      ctx.font = px + 'px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(a.emoji, PX(a.x), PY(a.y));
    }
    ctx.restore();
  }
  return cv.toDataURL('image/png');
}

async function saveTask(){
  _autosaveSkip = true;
  notify('Saving…');
  let dataUrl = null;
  try{
    dataUrl = compositeToDataUrl();
  }catch(e){
    console.error('composite failed:', e);
    notify('Could not render image — closing without save');
  }
  try{
    if(window.__TAURI__ && dataUrl){
      await window.__TAURI__.event.emit('screenshot-ready',{
        dataUrl,
        annotations: JSON.parse(JSON.stringify(annotations)),
        comments: JSON.parse(JSON.stringify(comments))
      });
    } else if(!window.__TAURI__ && dataUrl){
      // If we're inside an iframe from index.html, post the result back so the
      // parent updates the task slot. Otherwise just download.
      if(window.parent && window.parent !== window){
        try {
          window.parent.postMessage({
            type:'eb-screenshot-ready', dataUrl,
            annotations: JSON.parse(JSON.stringify(annotations)),
            comments: JSON.parse(JSON.stringify(comments))
          }, '*');
          notify('Saved'); return;
        } catch(e){ console.warn('post to parent failed', e); }
      }
      const a=document.createElement('a');a.download='engisnap-'+Date.now()+'.png';a.href=dataUrl;a.click();
      notify('Downloaded'); return;   // browser: keep window
    }
  }catch(e){ console.error('emit failed:', e); }
  await forceCloseEditor();           // ALWAYS close on Done
}

async function discard(){
  // In a web iframe, just tell the parent to close us.
  if(!window.__TAURI__ && window.parent && window.parent !== window){
    try { window.parent.postMessage({type:'eb-editor-close'}, '*'); return; } catch(_){}
  }
  // Explicit user action — close immediately, no save, no confirm
  // (native confirm() is blocked inside the Tauri webview anyway).
  await forceCloseEditor();
}

// v0.1.158 (P0 from review): 'd' shortcut for the removed Dimension tool
// is dropped — pressing D used to activate the tool even after the button
// was hidden in v0.1.157.
const KMAP={v:'select',h:'hand',r:'rect',c:'circle',a:'arrow',l:'line',p:'freehand',t:'text',b:'blur',q:'comment',m:'marker'};
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const k=e.key.toLowerCase();
  // v0.1.69: Enter = Done (save & close), Esc = Discard — Roman's request.
  // Esc first cancels any active text/comment edit or selection; if there's
  // nothing to cancel it discards & closes the window.
  if(e.key==='Enter' && !e.metaKey && !e.ctrlKey && !e.shiftKey){
    e.preventDefault(); saveTask(); return;
  }
  if(k==='escape'){
    e.preventDefault();
    const hadOverlay = (selId !== null) ||
      (document.getElementById('textInp')?.style.display === 'block');
    selId=null; closeCmtPop(); commitText(); renderAll(); updateList();
    if(!hadOverlay) discard();   // nothing to cancel → close
    return;
  }
  if(k==='e'){e.preventDefault();toggleEmojiPicker();return;}
  if(KMAP[k]){e.preventDefault();setTool(KMAP[k]);return;}
  if((e.metaKey||e.ctrlKey)&&e.shiftKey&&k==='z'){e.preventDefault();redoNext();return;}
  if((e.metaKey||e.ctrlKey)&&k==='z'){e.preventDefault();undoLast();return;}
  if((e.metaKey||e.ctrlKey)&&k==='y'){e.preventDefault();redoNext();return;}
  if((e.metaKey||e.ctrlKey)&&k==='w'){e.preventDefault();forceCloseEditor();return;}
  if(k==='delete'||k==='backspace'){if(selId) delAnn(selId);}
});

// v0.1.71: onCloseRequested NEVER preventDefault — that was the root cause of
// the unkillable window (preventDefault → await saveTask → invoke close_editor
// → w.close() → onCloseRequested again → loop; and if html2canvas threw, the
// window was held open forever). Now the title-bar ✕ does a best-effort
// fire-and-forget autosave emit and lets the window close normally. Explicit
// Done/Discard go through forceCloseEditor() → destroy() (no handler at all).
let _autosaveSkip = false;
let _closing = false;
(async () => {
  if(!window.__TAURI__ || !window.__TAURI__.window) return;
  try {
    const { getCurrentWindow } = window.__TAURI__.window;
    const win = getCurrentWindow();
    await win.onCloseRequested(async (event) => {
      // v0.1.126: the native red-X was only HIDING the window (OS default),
      // not destroying it. Now we take control: preventDefault, then DESTROY
      // via Rust close_editor (same as Done/Escape) — close WITHOUT saving.
      // Guard against re-entry. Fallback to JS destroy if invoke is slow.
      if(_closing) return;
      _closing = true;
      try { event.preventDefault(); } catch(_){}
      _autosaveSkip = true;
      const invoke = window.__TAURI__?.core?.invoke || window.__TAURI__?.invoke;
      let done = false;
      if(invoke){
        invoke('close_editor').then(() => { done = true; }).catch(()=>{});
      }
      // Fallback: if Rust didn't destroy within 250ms, force JS destroy
      setTimeout(() => {
        if(done) return;
        try {
          const gw = window.__TAURI__?.window?.getCurrentWindow;
          if(gw) gw().destroy();
        } catch(_){ try { window.close(); } catch(_){} }
      }, 250);
    });
  } catch(e) { console.error('cannot install close handler', e); }
})();

function notify(m){const el=document.getElementById('notif');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1600);}

// Tauri load image
function loadScreenshotAsBg(dataUrl){
  if(!dataUrl) return;
  try { console.log('[EB-EDITOR] loadScreenshotAsBg: src=', dataUrl.slice(0,80)); } catch(_){}
  // v0.1.120: keep the loading overlay UNTIL the image actually loads. The
  // window-size fallback below handles paper sizing even while the overlay
  // covers #cw — so we no longer remove the overlay early (that left a blank
  // dark editor when the image failed, with no feedback or escape).
  const bg=document.getElementById('realBg');
  bg.style.display='block';
  bg.onload=function(){
    try { console.log('[EB-EDITOR] img loaded:', bg.naturalWidth, 'x', bg.naturalHeight); } catch(_){}
    const nw = bg.naturalWidth || 960;
    const nh = bg.naturalHeight || 600;
    const ratio = nw / nh;
    const cw = document.getElementById('cw');
    // Window dims as primary fallback (overlay may cover cw → offsetWidth 0)
    const cwW = (cw && cw.offsetWidth > 100) ? cw.offsetWidth : (window.innerWidth || 1200);
    const cwH = (cw && cw.offsetHeight > 100) ? cw.offsetHeight : ((window.innerHeight - 120) || 600);
    const maxW = Math.max(400, cwW - 40);
    const maxH = Math.max(300, cwH - 100);
    let w = nw, h = nh;
    if(w > maxW){ w = maxW; h = Math.round(w / ratio); }
    if(h > maxH){ h = maxH; w = Math.round(h * ratio); }
    paper.style.width = w + 'px';
    paper.style.height = h + 'px';
    try { console.log('[EB-EDITOR] paper sized:', w, 'x', h, '(cw was', cwW, 'x', cwH, ')'); } catch(_){}
    // Only NOW remove the overlay — image is in place
    const initOv = document.getElementById('_eb_initial');
    if(initOv) initOv.remove();
    notify('Screenshot loaded');
  };
  bg.onerror=function(e){
    try { console.error('[EB-EDITOR] img FAILED to load:', (dataUrl||'').slice(0,200), e); } catch(_){}
    // Show the error in the overlay (don't leave a blank dark screen)
    const msg = document.getElementById('_eb_initial_msg');
    if(msg) msg.textContent = 'Could not load the screenshot image. You can close and re-open it.';
    const sp = document.querySelector('#_eb_initial div[style*="border-top"]');
    if(sp) sp.style.display = 'none';  // hide the spinner on error
  };
  bg.src=dataUrl;
}
// Browser fallback: parent window (index.html in web mode) ships the image
// via postMessage; we render it and reply back when the user clicks Done.
(function(){
  if(window.__TAURI__) return;
  let _loaded = false;
  window.addEventListener('message', ev => {
    const d = ev.data || {};
    if(d.type === 'eb-load-image' && d.dataUrl && !_loaded){
      _loaded = true;
      try { document.getElementById('_eb_initial')?.remove(); } catch(_){}
      try { loadScreenshotAsBg(d.dataUrl); } catch(e){ console.error(e); }
    }
  });
})();
(async function(){
  if(!window.__TAURI__) return;
  let _loadedHash = null;
  let _loaded = false;
  const _dbg = [];
  const dbg = (msg) => {
    const line = `[${Date.now()%100000}] ${msg}`;
    _dbg.push(line);
    try { console.log('[EB-EDITOR]', line); } catch(_){}
    // v0.1.104: also update the loading overlay so user sees progress
    const initMsg = document.getElementById('_eb_initial_msg');
    if(initMsg) initMsg.textContent = msg;
  };
  dbg('boot: __TAURI__ keys=' + Object.keys(window.__TAURI__).join(','));
  const hash = (s) => { let h=0; for(let i=0;i<Math.min(s.length,512);i++) h=((h<<5)-h+s.charCodeAt(i))|0; return h; };

  // v0.1.92: detailed diagnostic overlay if image doesn't load in 3.5s
  setTimeout(() => {
    if(_loaded) return;
    dbg(`timeout: still not loaded`);
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F8FAFC;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#0F172A;padding:30px;overflow:auto';
    const log = _dbg.join('\n');
    overlay.innerHTML = `
      <div style="max-width:640px;width:100%">
        <div style="font-size:40px;margin-bottom:12px;text-align:center">⚠️</div>
        <h2 style="margin:0 0 8px;font-size:18px;font-weight:600;text-align:center">Couldn't load the screenshot</h2>
        <p style="margin:0 0 16px;font-size:13px;color:#64748B;line-height:1.5;text-align:center">
          Diagnostic log — copy this and send to support so we can fix the issue.
        </p>
        <textarea id="_dbgLog" readonly style="width:100%;height:200px;font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px;padding:10px;border:1px solid #E2E8F0;border-radius:8px;background:#F8FAFC;color:#0F172A;resize:vertical;line-height:1.5">${log.replace(/[<>]/g,'')}</textarea>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button id="_dbgCopy" style="flex:1;background:#0EA5E9;color:#fff;border:none;font-weight:600;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit">Copy log</button>
          <button onclick="forceCloseEditor()" style="flex:1;background:#fff;border:1px solid #E2E8F0;color:#0F172A;font-weight:600;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit">Close editor</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const copyBtn = document.getElementById('_dbgCopy');
    if(copyBtn) copyBtn.onclick = async () => {
      try {
        const ta = document.getElementById('_dbgLog');
        if(navigator.clipboard) await navigator.clipboard.writeText(ta.value);
        else { ta.select(); document.execCommand('copy'); }
        copyBtn.textContent = '✓ Copied';
      } catch(e){ copyBtn.textContent = 'Copy failed: ' + e.message; }
    };
  }, 3500);

  // v0.1.100: load screenshot via custom URI scheme `eb-shot://current`.
  // Rust registered this scheme as an HTTP-style handler that returns the
  // image bytes. The WebView loads it like any normal image URL — no IPC
  // payload size limits, no asset:// URL construction headaches.
  const applyPayload = async (dataUrl, annotations, comments, filePath, shotUrl) => {
    dbg(`applyPayload: shotUrl=${shotUrl||'null'} filePath=${filePath?'set':'null'} dataUrl=${dataUrl?'len='+dataUrl.length:'null'} ann=${annotations?.length||0} com=${comments?.length||0}`);
    let resolvedSrc = null;
    if(shotUrl){
      // Add a cache-buster so repeat opens don't reuse a stale image
      resolvedSrc = shotUrl + '?t=' + Date.now();
      dbg(`using shotUrl: ${resolvedSrc}`);
    } else if(dataUrl){
      resolvedSrc = dataUrl;
      dbg('falling back to dataUrl');
    }
    if(resolvedSrc){
      const h = hash(resolvedSrc);
      if(h !== _loadedHash){
        _loadedHash = h;
        _loaded = true;
        loadScreenshotAsBg(resolvedSrc);
      }
    }
    try {
      if(Array.isArray(annotations) && annotations.length){
        window.annotations = annotations;
        if(typeof undoStack !== 'undefined'){ undoStack = []; redoStack = []; }
        if(typeof renderAll === 'function') renderAll();
        if(typeof updateList === 'function') updateList();
        if(typeof updateCount === 'function') updateCount();
      }
      if(Array.isArray(comments) && comments.length){
        window.comments = comments;
        window.commentCount = comments.length;
        if(typeof renderAll === 'function') renderAll();
        if(typeof updateList === 'function') updateList();
        if(typeof updateCount === 'function') updateCount();
      }
      const total = (annotations?.length||0) + (comments?.length||0);
      if(total) notify(`Restored ${total} annotations`);
    } catch(err){ console.warn('apply annotations failed:', err); }
  };

  // v0.1.84: PRIMARY load path — pull from Rust state via invoke.
  const invoke = window.__TAURI__.core?.invoke || window.__TAURI__.invoke;
  dbg(`invoke available: ${!!invoke}`);
  if(invoke){
    try {
      dbg('calling get_pending_editor_data...');
      const data = await invoke('get_pending_editor_data');
      dbg(`get_pending_editor_data returned: ${data ? 'data (filePath='+(data.filePath||'null')+' dataUrl='+(data.dataUrl?'len='+data.dataUrl.length:'null')+')' : 'null/undefined'}`);
      if(data){
        await applyPayload(data.dataUrl, data.annotations, data.comments, data.filePath, data.shotUrl);
      }
    } catch(err){
      dbg(`get_pending_editor_data threw: ${err?.message || err}`);
      console.warn('get_pending_editor_data failed:', err);
    }
  }

  // v0.1.39: FALLBACK — backend also emits load-image via events for backward compat.
  dbg('registering load-image listener');
  await window.__TAURI__.event.listen('load-image', e => {
    dbg(`load-image event: payload=${e.payload ? 'len='+e.payload.length : 'null'}`);
    if(!e.payload) return;
    const h = hash(e.payload);
    if(h === _loadedHash){ dbg('  → dedupe (same hash)'); return; }
    _loadedHash = h;
    _loaded = true;
    loadScreenshotAsBg(e.payload);
  });
  dbg('load-image listener registered');
  await window.__TAURI__.event.listen('load-annotations', e => {
    try {
      const p = e.payload || {};
      applyPayload(null, p.annotations, p.comments, null, null).catch(()=>{});
    } catch(err){ console.warn('load-annotations failed:', err); }
  });
})();
</script>
